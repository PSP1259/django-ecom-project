
{% extends 'partials/base.html' %}
{% load static %}
{% block content %}

<div class="row justify-content-center pt-lg-4 text-center" style="margin-bottom: 200px; margin-top: 100px;">
    <div class="col-lg-5 col-md-7 col-sm-9">
        <h1 class="display-404 py-lg-3">Payment Completed</h1>
        <h2 class="h3 mb-4">Your order has been successfully placed. Order Id #{{order.oid}}</h2>
        <p class="fs-md mb-4">
        <a href="#">Contact us</a> if you have any issue or question
        </p>
    </div>
</div>

{% if order.paid_status %}
<script>
  // GA4 purchase
  // GTM dataLayer equivalent of:
  // gtag("event", "purchase", { transaction_id, value, tax, shipping, currency, coupon, customer_type, items })
  window.dataLayer = window.dataLayer || [];
  window.dataLayer.push({ ecommerce: null });
  window.dataLayer.push({
    event: "purchase",
    ecommerce: {
      transaction_id: "{{ order.oid|escapejs }}",
      value: {{ order.price|stringformat:'.2f' }},
      tax: 0,
      shipping: 0,
      currency: "CHF",
      {% if order_coupon_code %}
      coupon: "{{ order_coupon_code|escapejs }}",
      {% endif %}
      customer_type: "{{ customer_type|escapejs }}",
      items: [
        {% for item in tracking_items %}
        {
          item_id: "{{ item.item_id|escapejs }}",
          item_name: "{{ item.item_name|escapejs }}",
          item_brand: "{{ item.item_brand|default:''|escapejs }}",
          item_category: "{{ item.item_category|default:''|escapejs }}",
          item_variant: "{{ item.item_variant|default:''|escapejs }}",
          price: {{ item.price|stringformat:'.2f' }},
          quantity: {{ item.quantity }}
        }{% if not forloop.last %},{% endif %}
        {% endfor %}
      ]
    }
  });
</script>
{% endif %}

{% endblock content %}
