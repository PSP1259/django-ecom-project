
{% extends 'partials/base.html' %}
{% load static %}
{% block content %}

<div class="row justify-content-center pt-lg-4 text-center" style="margin-bottom: 200px; margin-top: 100px;">
    <div class="col-lg-5 col-md-7 col-sm-9">
        <h1 class="display-404 py-lg-3">Payment Completed</h1>
        <h2 class="h3 mb-4">Your order has been successfully placed. Order Id #{{order.oid}}</h2>
        <p class="fs-md mb-4">
        <a href="#">Contact us</a> if you have any issue or question
        </p>
    </div>
</div>

{% if order.paid_status %}
<script>
  window.dataLayer = window.dataLayer || [];
  var purchasedItems = [];

  function normalizeOrderItemId(rawId) {
    var idValue = String(rawId || "");
    var match = idValue.match(/^INVOICE_NO-\d+-(.+)$/);
    return match && match[1] ? match[1] : idValue;
  }

  {% for item in order_items %}
  purchasedItems.push({
    item_id: normalizeOrderItemId("{{ item.invoice_no|escapejs }}"),
    item_name: "{{ item.item|escapejs }}",
    price: parseFloat("{{ item.price }}"),
    quantity: parseInt("{{ item.qty }}", 10)
  });
  {% endfor %}

  var transactionId = "{{ order.oid|escapejs }}";
  var purchaseStorageKey = "ga4_purchase_sent_" + transactionId;
  var alreadyTracked = false;

  try {
    alreadyTracked = window.sessionStorage.getItem(purchaseStorageKey) === "1";
  } catch (error) {
    alreadyTracked = false;
  }

  if (!alreadyTracked) {
    window.dataLayer.push({
      event: "purchase",
      ecommerce: {
        transaction_id: transactionId,
        value: parseFloat("{{ order.price }}"),
        currency: "CHF",
        items: purchasedItems
      }
    });

    try {
      window.sessionStorage.setItem(purchaseStorageKey, "1");
    } catch (error) {
      // Ignore storage issues.
    }
  }
</script>
{% endif %}

{% endblock content %}
